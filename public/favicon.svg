<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- 背景渐变 -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- 圆形背景 -->
  <circle cx="50" cy="50" r="48" fill="url(#bgGradient)"/>
  
  <!-- K 线图 - 红色上涨 -->
  <polyline points="25,65 35,55 45,60 55,45 65,50 75,35" 
            fill="none" 
            stroke="#ef5350" 
            stroke-width="4" 
            stroke-linecap="round" 
            stroke-linejoin="round"/>
  
  <!-- 成交量柱状图 -->
  <rect x="30" y="65" width="6" height="10" fill="#26a69a" opacity="0.8"/>
  <rect x="42" y="60" width="6" height="15" fill="#ef5350" opacity="0.8"/>
  <rect x="54" y="55" width="6" height="20" fill="#26a69a" opacity="0.8"/>
  <rect x="66" y="50" width="6" height="25" fill="#ef5350" opacity="0.8"/>
</svg>
